services:
  buswatch:
    build: .
    container_name: buswatch-backend
    ports:
      - "8081:8080"
    env_file:
      - ../.env
    volumes:
      - ../settings.json:/app/settings.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 60s
      timeout: 5s
      retries: 3
